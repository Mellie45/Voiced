name: wolpz
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 2.1.0+5

environment:
  sdk: '>=3.4.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.6
  image_picker: ^1.2.0
  permission_handler: ^12.0.1
  shared_preferences: ^2.5.3
  country_flags: ^4.1.0
  speech_to_text: ^7.3.0
  file_picker: ^10.3.3
  flutter_tts: ^4.2.3
  provider: ^6.1.5+1
  flutter_spinkit: ^5.2.2
  flutter_image_compress: ^2.3.0
  path_provider: ^2.1.4
  path: ^1.9.0
  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.14.4
  fluttertoast: ^9.0.0
  firebase_core: ^4.2.1
  firebase_app_check: ^0.4.1+2
  firebase_ai: ^3.5.0
  firebase_auth: ^6.1.2
  cloud_firestore: ^6.1.0
  introduction_screen: ^4.0.0
  purchases_flutter: ^9.9.6
  cloud_functions: ^6.0.4
  url_launcher: ^6.3.2
  device_info_plus: ^12.3.0
  flutter_secure_storage: ^10.0.0
  share_plus: ^12.0.1

flutter_native_splash:
  android: true
  ios: true
  web: false

  color: "#ff4000"
  color_dark_ios: "#ff4000"
  image: "assets/splash_logo.png"
  image_ios: "assets/adaptive_eye_white_ios.png"
  fullscreen: true
  android_12:
    color: "#ff4000"
    image: "assets/splash_logo.png"

flutter_launcher_icons:
  ios: true
  android: true
  image_path: "assets/app_icon_white.png"
  image_path_ios: "assets/app_icon_ios.png"

  adaptive_icon_background: "#ff4000"
  adaptive_icon_foreground: "assets/adaptive_eye_white.png"
  min_sdk_android: 21
  remove_alpha_ios: true

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  change_app_package_name: ^1.5.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/
    - assets/sounds/
  fonts:
    - family: PTSans
      fonts:
        - asset: assets/fonts/PTSansNarrow-Regular.ttf
        - asset: assets/fonts/PTSansNarrow-Bold.ttf
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans-Italic-VariableFont_wdth,wght.ttf
        - asset: assets/fonts/NotoSans-VariableFont_wdth,wght.ttf
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Italic-VariableFont_opsz,wght.ttf
        - asset: assets/fonts/Inter-VariableFont_opsz,wght.ttf

dependency_overrides:
  intl: 0.20.2